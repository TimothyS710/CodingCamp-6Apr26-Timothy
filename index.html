<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="top-bar">
    <span class="app-title">Life Dashboard</span>
    <button id="theme-toggle-btn" class="theme-btn" aria-label="Switch to dark mode">🌙 Dark</button>
  </header>

  <main class="dashboard">

    <!-- Greeting & Clock -->
    <section class="card card--greeting">
      <p id="greeting-text" class="greeting-text">Good Morning</p>
      <p id="clock-time" class="clock-time">00:00:00</p>
      <p id="clock-date" class="clock-date"></p>
      <div class="name-row">
        <input id="name-input" type="text" placeholder="Your name…" class="input" />
        <button id="name-save-btn" class="btn btn--primary">Save</button>
      </div>
    </section>

    <!-- Pomodoro Timer -->
    <section class="card card--pomodoro">
      <h2 class="card-title">Pomodoro Timer</h2>
      <p id="pomodoro-display" class="pomodoro-display">25:00</p>
      <p id="pomodoro-notification" class="pomodoro-notification" style="display:none"></p>
      <div class="btn-row">
        <button id="pomodoro-start-btn" class="btn btn--primary">Start</button>
        <button id="pomodoro-stop-btn" class="btn btn--secondary">Stop</button>
        <button id="pomodoro-reset-btn" class="btn btn--ghost">Reset</button>
      </div>
      <div class="duration-row">
        <input id="pomodoro-duration-input" type="number" min="1" placeholder="Minutes" class="input input--sm" />
        <button id="pomodoro-save-btn" class="btn btn--secondary">Set</button>
      </div>
      <p id="pomodoro-error" class="error-msg"></p>
    </section>

    <!-- To-Do List -->
    <section class="card card--todo">
      <h2 class="card-title">To-Do List</h2>
      <div class="todo-input-row">
        <input id="todo-input" type="text" placeholder="Add a task…" class="input" />
        <button id="todo-add-btn" class="btn btn--primary">Add</button>
      </div>
      <p id="todo-error" class="error-msg"></p>
      <div class="sort-row">
        <label for="todo-sort" class="sort-label">Sort:</label>
        <select id="todo-sort" class="select">
          <option value="pending">Pending first</option>
          <option value="completed">Completed first</option>
          <option value="alpha">Alphabetical</option>
        </select>
      </div>
      <ul id="todo-list" class="todo-list"></ul>
    </section>

    <!-- Quick Links -->
    <section class="card card--links">
      <h2 class="card-title">Quick Links</h2>
      <div class="links-form">
        <input id="links-name-input" type="text" placeholder="Link name" class="input" />
        <input id="links-url-input" type="text" placeholder="https://…" class="input" />
        <button id="links-add-btn" class="btn btn--primary">Add</button>
      </div>
      <p id="links-error" class="error-msg"></p>
      <div id="links-container" class="links-container"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
